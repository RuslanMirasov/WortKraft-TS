<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Немає підключення до інтернету</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        justify-content: center;
        align-items: center;
        align-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        font-weight: 400;
        gap: 12px;
        background: #fff;
        color: #292b2d;
        padding: 40px 20px;
      }

      .text {
        display: block;
        width: 100%;
        margin: 0 auto;
        text-align: center;
      }

      h1 {
        font-size: 26px;
        line-height: 1.1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        font-weight: 700;
      }

      p {
        font-size: 17px;
        line-height: 1.4;
        opacity: 0.7;
      }

      img {
        display: block;
        width: 330px;
      }

      .button {
        display: block;
        border: none;
        background: #4cb210;
        color: #fff;
        padding: 18px 26px;
        border-radius: 100px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        font-weight: 500;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        margin-top: 20px;
        text-transform: uppercase;
        min-width: 200px;
      }
    </style>
  </head>
  <body>
    <img src="/img/lex/500.webp" alt="WortKraft нет соединения с интернетом" />
    <h1 class="text">Немає підключення до&nbsp;інтернету</h1>
    <p class="text">Перевір підключення та&nbsp;спробуй&nbsp;знову</p>
    <button onclick="window.location.reload()" class="button">Спробувати знову</button>
  </body>
</html>
